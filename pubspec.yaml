name: proscores
description: "Pronostics foot Coupe du Monde — combinés par mise / objectif / risque."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  http: ^1.6.0
  google_fonts: ^6.3.2
  intl: ^0.20.2
  flutter_svg: ^2.2.3
  country_flags: ^4.1.2
  shared_preferences: ^2.3.2
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/buttons/
    - assets/icons/
