name: proscores_server
description: >
  Backend proxy + cache for the ProScores app. Hides the API keys, caches
  static data (team ids, squads, flags, h2h) in SQLite, and forwards the rest
  to The Odds API and API-Football.
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.0.0

dependencies:
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  http: ^1.2.0
  sqlite3: ^2.4.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
